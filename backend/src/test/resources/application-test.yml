# 开发环境
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

deepseek:
  api-key: test-key
  base-url: http://localhost:${wiremock.server.port:0}
  model: deepseek-chat
  timeout: 30000

# 禁用 resilience 重试/熔断（集成测试中不需要）
resilience4j:
  retry:
    instances:
      deepseek:
        max-attempts: 1
  circuitbreaker:
    instances:
      deepseek:
        sliding-window-size: 100
        failure-rate-threshold: 100
        wait-duration-in-open-state: 1ms

# 安全熔断器（测试环境）
safety:
  circuit:
    safety-threshold: 10.0
    meltdown-threshold: 10.0
    consecutive-fails-to-open: 999