server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ai-health-system
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_health_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  task:
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 100
        thread-name-prefix: ai-task-

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ⚠️ JWT_SECRET 必须在启动前设置（至少256位强密钥）
#    开发环境可复制 .env.example 到 .env 后设置
#    生成强密钥示例: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET}
  access-token-expire: 7200000
  refresh-token-expire: 604800000
  header: Authorization
  token-prefix: Bearer

app:
  upload:
    avatar-dir: uploads/avatars

sms:
  dev-mode: ${SMS_DEV_MODE:true}

deepseek:
  base-url: https://api.deepseek.com/v1
  api-key: ${DEEPSEEK_API_KEY:}
  model: deepseek-chat
  timeout: 30000

resilience4j:
  retry:
    instances:
      deepseek:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.lang.RuntimeException
          - java.io.IOException
        ignore-exceptions:
          - com.example.common.BusinessException
      qwen:
        max-attempts: 2
        wait-duration: 3s
      glm:
        max-attempts: 2
        wait-duration: 3s
      moonshot:
        max-attempts: 2
        wait-duration: 3s
  circuitbreaker:
    instances:
      deepseek:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      qwen:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 120s
        permitted-number-of-calls-in-half-open-state: 2
      glm:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 120s
        permitted-number-of-calls-in-half-open-state: 2
      moonshot:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 120s
        permitted-number-of-calls-in-half-open-state: 2
  ratelimiter:
    instances:
      ai-api:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 5s
  bulkhead:
    instances:
      ai-api:
        max-concurrent-calls: 5
        max-wait-duration: 10s

# 多模型容灾配置
resilience:
  # 通义千问（备选模型1）
  qwen:
    api-key: ${QWEN_API_KEY:}
  # 智谱 GLM-4（备选模型2）
  glm:
    api-key: ${GLM_API_KEY:}
  # 月之暗面 Moonshot（备选模型3）
  moonshot:
    api-key: ${MOONSHOT_API_KEY:}

# 安全熔断器配置
safety:
  circuit:
    safety-threshold: 9.0
    meltdown-threshold: 7.5
    consecutive-fails-to-open: 5
    sliding-window-minutes: 30
    half-open-test-interval: 10
    half-open-test-count: 3

# LLMOps 运维配置
llmops:
  alert:
    daily-budget: 10.00
    cost-warning-threshold: 0.80
    cost-critical-threshold: 0.95
    safety-warning-threshold: 9.0
    safety-critical-threshold: 7.5
  webhook:
    # 钉钉机器人 Webhook 地址
    dingtalk: ${LLMOPS_WEBHOOK_DINGTALK:}
    # 飞书机器人 Webhook 地址
    feishu: ${LLMOPS_WEBHOOK_FEISHU:}
    # 企业微信机器人 Webhook 地址
    wecom: ${LLMOPS_WEBHOOK_WECOM:}

# CORS 配置 — 生产环境通过 ALLOWED_ORIGINS 覆盖（逗号分隔多个域名）
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

logging:
  level:
    root: ERROR
    com.example: ${LOG_LEVEL:INFO}
    org.springframework.web: WARN

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ai-health-system
