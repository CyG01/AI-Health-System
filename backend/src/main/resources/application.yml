server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ai-health-system
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_health_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  task:
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 100
        thread-name-prefix: ai-task-

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:ai-health-system-dev-secret-do-not-use-in-production}
  access-token-expire: 7200000
  refresh-token-expire: 604800000
  header: Authorization
  token-prefix: Bearer

app:
  upload:
    avatar-dir: uploads/avatars

sms:
  dev-mode: true

deepseek:
  base-url: https://api.deepseek.com/v1
  api-key: ${DEEPSEEK_API_KEY:}
  model: deepseek-chat
  timeout: 30000

resilience4j:
  retry:
    instances:
      deepseek:
        max-attempts: 3
        wait-duration: 2s
  circuitbreaker:
    instances:
      deepseek:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3

cors:
  allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

logging:
  level:
    root: WARN
    com.example: INFO
    org.springframework.web: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
